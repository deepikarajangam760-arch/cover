<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Cover</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
    font-family:Georgia, serif;
}

.book-cover{
    width:400px;
    height:600px;
    background:rgb(166,216,112);
    border:2px solid black;
    padding:30px;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.title{
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.line{
    width:50px;
    height:2px;
    background:black;
    margin:10px auto;
}

.subtitle{
    text-align:center;
    font-style:italic;
}

.image{
    text-align:center;
    margin:30px 0;
}

.image img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.author{
    text-align:center;
    font-size:22px;
}

</style>
</head>

<body>

<div class="book-cover">

<div>
<div class="title">The Soul of Life</div>
<div class="line"></div>
<div class="subtitle">The Rhythm Of Existence</div>
</div>

<div class="image">
<img src="soul.png" alt="Book image"></div>

<div class="author">
R.DEEPIKA
</div>

</div>

</body>
</html>
